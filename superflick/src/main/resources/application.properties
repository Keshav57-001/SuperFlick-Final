# ── File uploads ──────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Server ────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain
server.error.include-message=always
server.error.include-binding-errors=always

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:c3VwZXJmbGljay1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmctZm9yLUhNQUMtU0hBMjU2}
app.jwt.expiry-ms=86400000
app.jwt.refresh-expiry-ms=604800000

# ── OTP ───────────────────────────────────────────────────────
app.otp.ttl-seconds=300

# ── AWS S3 ────────────────────────────────────────────────────
app.aws.region=${AWS_REGION:ap-south-1}
app.aws.bucket=${AWS_S3_BUCKET:superflick-dev}
app.aws.access-key=${AWS_ACCESS_KEY:}
app.aws.secret-key=${AWS_SECRET_KEY:}
app.aws.endpoint=${AWS_ENDPOINT:}

# ── Razorpay ──────────────────────────────────────────────────
app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
app.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}

# ── Stripe ────────────────────────────────────────────────────
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# ── OpenAI ────────────────────────────────────────────────────
openai.api.key=${OPENAI_API_KEY:}

# ── SMS — MSG91 ───────────────────────────────────────────────
app.sms.msg91.api-key=${MSG91_API_KEY:}
app.sms.msg91.sender-id=${MSG91_SENDER_ID:SFLICK}
app.sms.msg91.template-id=${MSG91_TEMPLATE_ID:}

# ── CORS ──────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}

# ── OpenAPI server URL ────────────────────────────────────────
app.openapi.server-url=${SERVER_URL:http://localhost:8080}

# ── Swagger / SpringDoc ───────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ── Actuator ──────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Mail sender identity ───────────────────────────────────────
# Must match a verified sender in your Brevo account.
# Brevo → Senders & Domains → Add a Sender
app.mail.from=${MAIL_FROM:ranjankeshav0@gmail.com}
app.mail.name=${MAIL_NAME:SuperFlick}